<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Job</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .apply-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px 14px;
            background:
                radial-gradient(900px 500px at 8% -8%, rgba(34, 197, 94, 0.16), transparent 55%),
                radial-gradient(900px 500px at 100% 0%, rgba(59, 130, 246, 0.16), transparent 55%),
                #020202;
        }

        .apply-card {
            width: min(640px, 100%);
            background: linear-gradient(180deg, #0d0d0d, #080808);
            border: 1px solid #1f1f1f;
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        }

        .apply-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 18px;
        }

        .back-jobs {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: #d1d5db;
            border: 1px solid #2a2a2a;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .back-jobs:hover {
            color: #fff;
            background: #171717;
            border-color: #3a3a3a;
        }

        .apply-title {
            margin: 0;
            font-size: 24px;
            letter-spacing: 0.01em;
        }

        .apply-subtitle {
            margin: 6px 0 18px;
            color: #94a3b8;
            font-size: 14px;
        }

        .apply-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .apply-grid .full {
            grid-column: 1 / -1;
        }

        .resume-label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
        }

        .resume-input {
            margin-bottom: 0;
        }

        .submit-btn {
            width: 100%;
            margin-top: 14px;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: #052e14;
            font-weight: 700;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #22c55e, #4ade80);
        }

        @media (max-width: 640px) {
            .apply-card {
                padding: 16px;
                border-radius: 14px;
            }

            .apply-grid {
                grid-template-columns: 1fr;
            }

            .apply-top {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="apply-shell">
    <div class="apply-card">
        <div class="apply-top">
            <a class="back-jobs" href="/jobs">← Back to Manage Jobs</a>
        </div>

        <h2 class="apply-title">Apply for {{ job["title"] }}</h2>
        <p class="apply-subtitle">Fill the details below to submit this application.</p>

        <form method="POST" enctype="multipart/form-data">
            <div class="apply-grid">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="text" name="phone" class="full" placeholder="Phone Number" required>

                <div class="full">
                    <label class="resume-label" for="resume">Resume (PDF/DOC)</label>
                    <input id="resume" type="file" name="resume" class="resume-input" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
    </div>
</div>

</body>
</html>
