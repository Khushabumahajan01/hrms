{% extends "base.html" %}

{% block content %}

<h1 class="page-title">Settings</h1>
<p class="subtitle">Manage account settings</p>

<div class="card" style="max-width:420px;">

    <h3 style="margin-bottom:12px;">Change Password</h3>

    <form method="POST">
        <div class="password-field">
            <input type="password" name="old_password" id="old_password" placeholder="Old Password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('old_password', this)" aria-label="Toggle password visibility">
                <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M10.733 5.076A10.744 10.744 0 0 1 12 5c4.477 0 8.268 2.943 9.543 7a9.994 9.994 0 0 1-.726 1.933"/>
                    <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/>
                    <path d="M17.479 17.499A10.75 10.75 0 0 1 12 19c-4.477 0-8.268-2.943-9.543-7a10.024 10.024 0 0 1 4.02-5.24"/>
                    <path d="m2 2 20 20"/>
                </svg>
            </button>
        </div>
        
        <div class="password-field">
            <input type="password" name="new_password" id="new_password" placeholder="New Password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('new_password', this)" aria-label="Toggle password visibility">
                <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M10.733 5.076A10.744 10.744 0 0 1 12 5c4.477 0 8.268 2.943 9.543 7a9.994 9.994 0 0 1-.726 1.933"/>
                    <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/>
                    <path d="M17.479 17.499A10.75 10.75 0 0 1 12 19c-4.477 0-8.268-2.943-9.543-7a10.024 10.024 0 0 1 4.02-5.24"/>
                    <path d="m2 2 20 20"/>
                </svg>
            </button>
        </div>
        
        <div class="password-field">
            <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm New Password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('confirm_password', this)" aria-label="Toggle password visibility">
                <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M10.733 5.076A10.744 10.744 0 0 1 12 5c4.477 0 8.268 2.943 9.543 7a9.994 9.994 0 0 1-.726 1.933"/>
                    <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/>
                    <path d="M17.479 17.499A10.75 10.75 0 0 1 12 19c-4.477 0-8.268-2.943-9.543-7a10.024 10.024 0 0 1 4.02-5.24"/>
                    <path d="m2 2 20 20"/>
                </svg>
            </button>
        </div>

        <button type="submit" style="margin-top:10px; width:100%;">
            Update Password
        </button>
    </form>

    {% if message %}
        <div class="alert alert-{{ message_type }}" style="margin-top:15px;">
            {{ message }}
        </div>
    {% endif %}

</div>

<style>
.password-field {
    position: relative;
    margin-bottom: 12px;
}

.password-field input {
    width: 100%;
    padding-right: 46px;
    margin-bottom: 0;
    box-sizing: border-box;
}

.toggle-password {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    width: 30px;
    height: 30px;
    cursor: pointer;
    padding: 0;
    color: #888;
    transition: color 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.toggle-password svg {
    display: block;
}

.toggle-password:hover {
    color: #fff;
}

.toggle-password .icon-eye-off {
    display: none;
}

.toggle-password.is-visible .icon-eye {
    display: none;
}

.toggle-password.is-visible .icon-eye-off {
    display: block;
}

.logout-btn{
    display:inline-block;
    padding:10px 18px;
    background:#ef4444;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
    width: 100%;
    text-align: center;
    box-sizing: border-box;
}
.logout-btn:hover{
    background:#dc2626;
}

.alert {
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
}

.alert-success {
    background: #1b5e20;
    color: #4caf50;
    border: 1px solid #2e7d32;
}

.alert-error {
    background: #5e1b1b;
    color: #ef5350;
    border: 1px solid #7d2e2e;
}
</style>

<script>
function togglePassword(fieldId, button) {
    const field = document.getElementById(fieldId);
    const isPassword = field.type === 'password';
    field.type = isPassword ? 'text' : 'password';
    if (button) {
        button.classList.toggle('is-visible', isPassword);
    }
}
</script>

{% endblock %}
