<!DOCTYPE html>
<html>
<head>
    <title>Print {{ doc_type }}</title>
    <style>
        @media print {
            body { background: white; color: black; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            .container { box-shadow: none !important; border: none !important; padding: 0 !important; max-width: 100% !important; margin: 0 !important; }
        }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            color: #1e293b;
            padding: 50px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .header-bar {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 20px auto 0 auto;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        .btn-print {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-print:hover {
            background: #2563eb;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>
    <div class="header-bar no-print">
        <span>⚠️ <strong>PDF Fallback Mode:</strong> Playwright failed. You can print/save as PDF using your browser.</span>
        <button class="btn-print" onclick="window.print()">🖨 Print / Save as PDF</button>
    </div>
    <div class="container">
        {{ html | safe }}
    </div>
    <script>
        window.onload = function() {
            setTimeout(function() { window.print(); }, 500);
        };
    </script>
</body>
</html>
