{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

<div class="card shadow p-4" style="background:#0b0f19; border-radius:15px;">
<h3 class="text-white mb-4">✏ Edit Employee</h3>

<form method="POST"
      action="/hrms/employees/{{ employee.id }}/edit">

<div class="mb-3">
<label class="text-white">Full Name</label>
<input type="text" name="full_name"
       value="{{ employee.full_name }}"
       class="form-control" required>
</div>

<div class="mb-3">
<label class="text-white">Email</label>
<input type="email" name="email"
       value="{{ employee.email }}"
       class="form-control" required>
</div>

<div class="mb-3">
<label class="text-white">Phone</label>
<input type="text" name="phone"
       value="{{ employee.phone }}"
       class="form-control">
</div>

<div class="mb-3">
<label class="text-white">Department</label>
<input type="text" name="department"
       value="{{ employee.department }}"
       class="form-control">
</div>

<div class="mb-3">
<label class="text-white">Role</label>
<select name="role_id" class="form-control">

{% for role in roles %}
<option value="{{ role.id }}"
{% if role.id == employee.role_id %}selected{% endif %}>
{{ role.role_name }}
</option>
{% endfor %}

</select>
</div>

<button class="btn btn-success">Update Employee</button>
<a href="/hrms/employees/ui" class="btn btn-secondary">Cancel</a>

</form>

</div>
</div>

{% endblock %}
