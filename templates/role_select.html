<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Login</title>
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        .role-container {
            text-align: center;
            margin-top: 40px;
        }

        .role-title {
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .role-subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 40px;
        }

        .role-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .role-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 35px 30px;
            width: 260px;
            text-align: center;
            transition: 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .role-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .role-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .role-card h3 {
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .role-card p {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .role-card a {
            text-decoration: none;
        }

        .role-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            background: white;
            color: black;
            transition: 0.3s;
        }

        .role-btn:hover {
            background: #e6e6e6;
        }

        @media (max-width: 767px) {
            .login-page {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
                padding: 24px 16px 32px;
            }

            .login-logo {
                position: static;
                transform: none;
                margin: 0 auto 14px;
            }

            .login-logo img {
                width: 76px;
            }

            .role-container {
                width: 100%;
                margin-top: 0;
            }

            .role-title {
                font-size: 26px;
            }

            .role-subtitle {
                margin-bottom: 20px;
            }

            .role-grid {
                flex-direction: column;
                align-items: center;
                gap: 14px;
            }

            .role-card {
                width: min(340px, 100%);
                padding: 22px 18px;
            }

            .role-btn {
                width: 100%;
            }
        }

        @media (min-width: 768px) and (max-width: 991px) {
            .login-page {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
                padding: 40px 24px 34px;
            }

            .login-logo {
                position: static;
                top: auto;
                transform: none;
                margin: 0 auto 16px;
            }

            .login-logo img {
                width: 88px;
            }

            .role-container {
                width: min(820px, 100%);
                margin-top: 0;
            }

            .role-title {
                font-size: 34px;
            }

            .role-subtitle {
                font-size: 16px;
                margin-bottom: 26px;
            }

            .role-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(260px, 1fr));
                gap: 20px;
            }

            .role-card {
                width: 100%;
                padding: 28px 22px;
            }

            .role-card:last-child {
                grid-column: 1 / -1;
                max-width: 360px;
                justify-self: center;
            }
        }
    </style>
</head>
<body>

<div class="login-page">

    <!-- Logo -->
    <div class="login-logo">
        <img src="/static/images/logo.png" alt="Logo">
    </div>

    <div class="role-container">

        <h1 class="role-title">Welcome Back</h1>
        <p class="role-subtitle">
            Select login option according to your role
        </p>

        <div class="role-grid">

            <!-- Admin -->
            <div class="role-card">
                <div class="role-icon">🛡️</div>
                <h3>Admin Login</h3>
                <p>System control & overall management access.</p>
                <a href="/login/Admin">
                    <button class="role-btn">Login</button>
                </a>
            </div>

            <!-- HR -->
            <div class="role-card">
                <div class="role-icon">👥</div>
                <h3>HR Login</h3>
                <p>Employee hiring & workforce management.</p>
                <a href="/login/HR">
                    <button class="role-btn">Login</button>
                </a>
            </div>

            <!-- Employee -->
            <div class="role-card">
                <div class="role-icon">👤</div>
                <h3>Employee Login</h3>
                <p>Self-service access & daily updates.</p>
                <a href="/login/Employee">
                    <button class="role-btn">Login</button>
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
